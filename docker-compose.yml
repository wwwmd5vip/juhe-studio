# TLS/SSL: This stack runs on plain HTTP. TLS termination should be handled by an
# external reverse proxy (Traefik, Caddy, nginx-proxy, or cloud load balancer).
# For local development, access via http://localhost:7074 (admin) and :7075 (API).

services:
  mysql:
    image: mysql:8.0
    container_name: juhe-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${DB_NAME:-juhe_management}
      MYSQL_USER: ${DB_USER:-juhe}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "127.0.0.1:7073:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/migrations/002_init_data.sql:/docker-entrypoint-initdb.d/002_init_data.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - juhe-management

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: juhe-management-server
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: ./server/.env
        required: false
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: 8080
      ENV: ${ENV:-production}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-juhe}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-juhe_management}
      DB_CHARSET: utf8mb4
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-300}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-60}
      # Security
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in production}
      BCRYPT_COST: ${BCRYPT_COST:-10}
      ROOT_USERNAME: ${ROOT_USERNAME:-root}
      ROOT_PASSWORD: ${ROOT_PASSWORD:?ROOT_PASSWORD must be set in production}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-8}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # HTTP
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-30}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-600}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-120}
      HTTP_READ_HEADER_TIMEOUT: ${HTTP_READ_HEADER_TIMEOUT:-10}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-10485760}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: ${LOG_FILE:-logs/server.log}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
      # Scheduler
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_SCHEDULE: ${SCHEDULER_SCHEDULE:-0 2 * * *}
      # Health Check
      HEALTH_CHECK_ENABLED: ${HEALTH_CHECK_ENABLED:-false}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-*/5 * * * *}
      HEALTH_CHECK_TIMEOUT: ${HEALTH_CHECK_TIMEOUT:-10}
      HEALTH_CHECK_THRESHOLD: ${HEALTH_CHECK_THRESHOLD:-3}
      HEALTH_CHECK_CONCURRENCY: ${HEALTH_CHECK_CONCURRENCY:-10}
      # Channel Retry
      CHANNEL_RETRY_MAX: ${CHANNEL_RETRY_MAX:-2}
      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@juhe.studio}
    volumes:
      - server_logs:/app/logs
    ports:
      - "127.0.0.1:7075:8080"
    networks:
      - juhe-management
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/public/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: juhe-management-admin
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:7074:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - juhe-management
    restart: unless-stopped

volumes:
  mysql_data:
  server_logs:

networks:
  juhe-management:
    driver: bridge
