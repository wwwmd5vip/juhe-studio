changelog:
  exclude:
    labels:
      - ignore-for-release
      - chore
    authors:
      - dependabot
  categories:
    - title: 🚀 新功能
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug 修复
      labels:
        - bug
        - fix
    - title: ⚡ 性能优化
      labels:
        - performance
        - optimization
    - title: 🛠️ 基础设施
      labels:
        - infra
        - build
        - ci
    - title: 📝 文档
      labels:
        - docs
        - documentation
    - title: Other Changes
      labels:
        - "*"
