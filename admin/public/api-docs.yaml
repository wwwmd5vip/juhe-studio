openapi: 3.0.3
info:
  title: Juhe Management Service
  description: OpenAI 兼容 API + 渠道转发 + 提示词管理 + 计费财务
  version: 1.0.0
  contact:
    name: Juhe Studio
servers:
  - url: http://localhost:19528
    description: Local development

paths:
  /v1/models:
    get:
      summary: List available models
      operationId: listModels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'

  /v1/chat/completions:
    post:
      summary: Create chat completion
      operationId: createChatCompletion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string

  /v1/images/generations:
    post:
      summary: Create image
      operationId: createImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageGenerationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationResponse'

  /api/auth/login:
    post:
      summary: Admin login
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK

  /api/users:
    get:
      summary: List users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: OK

  /api/tokens:
    get:
      summary: List API keys
      operationId: listTokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create API key
      operationId: createToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                remain_quota:
                  type: integer
                  description: quota in cents
                unlimited_quota:
                  type: boolean
      responses:
        '200':
          description: OK

  /api/channels:
    get:
      summary: List channels
      operationId: listChannels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create channel
      operationId: createChannel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Channel'
      responses:
        '200':
          description: OK

  /api/prompts/image:
    get:
      summary: List image prompts
      operationId: listImagePrompts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create image prompt
      operationId: createImagePrompt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagePrompt'
      responses:
        '200':
          description: OK

  /api/billing/quota:
    get:
      summary: Get current quota
      operationId: getQuota
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /api/billing/logs:
    get:
      summary: List billing logs
      operationId: listBillingLogs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: sk-<token> or jwt

  schemas:
    ModelList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
              created:
                type: integer
              owned_by:
                type: string

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [system, user, assistant, tool]
              content:
                type: string
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        max_tokens:
          type: integer

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    ImageGenerationRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
        prompt:
          type: string
        n:
          type: integer
          default: 1
        size:
          type: string
          default: 1024x1024
        response_format:
          type: string
          enum: [url, b64_json]
        quality:
          type: string
        style:
          type: string

    ImageGenerationResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              b64_json:
                type: string
              revised_prompt:
                type: string

    Channel:
      type: object
      required: [type, name, keys, models]
      properties:
        type:
          type: string
          enum: [openai-compatible, jimeng, custom]
        name:
          type: string
        base_url:
          type: string
        keys:
          type: string
        models:
          type: string
        groups:
          type: string
        weight:
          type: integer
        priority:
          type: integer
        model_mapping:
          type: object

    ImagePrompt:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        category_id:
          type: integer
        variables:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              default:
                type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published, archived]
